<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quechua Ayni - Aprendizaje de Quechua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <header class="container-fluid bg-success text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="images/logo.png" alt="Quechua Ayni" class="logo me-2">
                <h1 class="h4 mb-0">Quechua Ayni</h1>
            </div>
            <nav class="d-none d-md-block">
                <a href="#" class="text-white mx-2">Inicio</a>
                <a href="#" class="text-white mx-2">Acerca de</a>
                <a href="#" class="text-white mx-2">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-warning">Ingresar</button>
                            </div>
                            <div class="text-center mb-3">
                                <a href="#" class="text-muted small">¿Olvidaste tu contraseña?</a>
                            </div>
                            <div class="alert alert-secondary small py-2" role="alert">
                                Usuario ficticio:<br>
                                <strong>juan.perez@ejemplo.com</strong><br>
                                Contraseña: <strong>quechua123</strong>
                            </div>
                        </form>
                        <hr class="my-4">
                        <div class="text-center">
                            <p class="mb-2">¿No tienes una cuenta?</p>
                            <a href="register.html" class="btn btn-outline-success">Regístrate</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2026 Quechua Ayni - Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
